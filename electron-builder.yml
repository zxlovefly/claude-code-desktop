appId: com.claude-code-desktop.app
productName: Claude Code Desktop
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - node_modules/**/*
asar: false
win:
  target:
    - portable
  icon: build/icon.png
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
